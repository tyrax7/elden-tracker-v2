<div class="min-h-screen bg-gray-900 p-8 font-sans">
  <h1 class="text-5xl font-bold text-center text-yellow-500 mb-8 tracking-widest uppercase">Bestiaire de l'Entre-Terre</h1>
  
  <div class="mb-12 max-w-md mx-auto">
    <input 
      type="text" 
      [(ngModel)]="searchTerm" 
      (input)="onSearch()" 
      placeholder="Rechercher un boss à abattre..." 
      class="w-full px-4 py-3 rounded-lg bg-gray-800 text-gray-100 border border-gray-700 focus:outline-none focus:border-yellow-500 transition-all shadow-lg"
    >
  </div>
  
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
    
    <div *ngFor="let boss of filteredBosses" 
         [ngClass]="boss.isKilled ? 'opacity-60 grayscale scale-95 border-gray-800' : 'border-gray-700 hover:border-yellow-500 hover:-translate-y-1 hover:shadow-2xl hover:shadow-yellow-900/20'"
         class="flex flex-col bg-gray-800 rounded-xl overflow-hidden border-2 transition-all duration-300 relative">
      
      <div class="h-56 w-full relative bg-gray-900 border-b border-gray-700">
        <img [src]="boss.image || 'https://via.placeholder.com/400x200/1f2937/fbbf24?text=Elden+Ring'" 
             [alt]="boss.name" 
             class="w-full h-full object-cover">
             
        <div *ngIf="boss.isKilled" class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
          <span class="text-red-600 font-black text-4xl tracking-widest uppercase border-4 border-red-600 px-4 py-2 transform -rotate-12 backdrop-blur-sm">
            Vaincu
          </span>
        </div>
      </div>
      
      <div class="p-5 flex-grow flex flex-col justify-between">
        <div>
          <h2 class="text-2xl font-bold text-gray-100 mb-1">{{ boss.name }}</h2>
          <p class="text-sm text-yellow-600/80 uppercase tracking-wide font-semibold">{{ boss.region }}</p>
          <div class="mt-4 inline-block bg-gray-900 px-3 py-1 rounded border border-gray-700">
            <span class="text-red-500 font-bold text-sm">HP: {{ boss.healthPoints || '???' }}</span>
          </div>
        </div>
        
        <button (click)="toggleKilled(boss)"
                [ngClass]="boss.isKilled ? 'bg-gray-700 hover:bg-gray-600 text-gray-300' : 'bg-red-900 hover:bg-red-800 text-white'"
                class="mt-6 w-full py-3 rounded-lg font-bold transition-colors duration-200 border border-transparent shadow-lg">
          {{ boss.isKilled ? 'Ressusciter' : 'Déclarer vaincu' }}
        </button>
      </div>

    </div>

  </div>

  <div *ngIf="filteredBosses.length === 0" class="text-center text-gray-400 mt-12 text-xl">
    Aucun boss trouvé...
  </div>
</div>
